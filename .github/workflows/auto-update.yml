name: Auto Update Movies

on:
  schedule:
    # Chạy mỗi ngày vào lúc 00:00 UTC (khoảng 7h sáng giờ Việt Nam)
    - cron: '0 0 * * *'
    # Chạy mỗi ngày vào lúc 12:00 UTC (khoảng 7h tối giờ Việt Nam)
    - cron: '0 12 * * *'
  workflow_dispatch: # Cho phép chạy thủ công từ giao diện web GitHub

jobs:
  update-movies:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Update Script
        # Chạy script cập nhật, quét 3 trang đầu tiên (có thể sửa thành số khác)
        run: node sync-nguonc.js 1 3

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "Auto update movies $(date +'%Y-%m-%d %H:%M:%S')" &&
            git pull --rebase origin master &&
            git push
          )
