name: Bulk Fetch Movies

on:
  workflow_dispatch:
    inputs:
      start_page:
        description: 'Trang bắt đầu (ví dụ: 406)'
        required: true
        default: '406'
      end_page:
        description: 'Trang kết thúc (ví dụ: 800)'
        required: true
        default: '800'

jobs:
  bulk-fetch:
    runs-on: ubuntu-latest
    
    # Cho phép chạy tối đa 6 tiếng (giới hạn của GitHub Actions)
    timeout-minutes: 360 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Bulk Update Script
        run: node sync-nguonc.js ${{ github.event.inputs.start_page }} ${{ github.event.inputs.end_page }}

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "Bulk fetch movies (Pages ${{ github.event.inputs.start_page }} to ${{ github.event.inputs.end_page }})" &&
            git pull --rebase origin master &&
            git push
          )
